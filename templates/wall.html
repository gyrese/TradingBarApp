<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Bar Traders - La Bourse des Boissons</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">

    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.js"></script>

    <style>
        /* ===== VARIABLES ===== */
        :root {
            --bg: #030712;
            --surface: #070e1d;
            --surface-2: #0b1526;
            --card: #0a1225;
            --card-up: #0f0a10;
            --card-down: #070f0d;
            --card-krash: #12100a;

            --green: #00e676;
            --green-dim: #00994d;
            --green-light: #69f0ae;
            --green-glow: rgba(0,230,118,0.35);
            --green-bg: rgba(0,230,118,0.08);

            --red: #ff3d57;
            --red-dim: #bb2233;
            --red-light: #ff6b7a;
            --red-glow: rgba(255,61,87,0.35);
            --red-bg: rgba(255,61,87,0.08);

            --gold: #ffc107;
            --gold-bright: #ffe082;
            --gold-glow: rgba(255,193,7,0.4);

            --text: #eef0ff;
            --text-dim: #6b7a99;
            --border: rgba(255,255,255,0.06);
            --border-hi: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* ambient light */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 55% at 8% 5%, rgba(0,230,118,0.05) 0%, transparent 60%),
                radial-gradient(ellipse 70% 55% at 92% 95%, rgba(255,61,87,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(30,80,200,0.02) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }
        /* scanlines */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.015) 3px, rgba(0,0,0,0.015) 4px);
            z-index: 0; pointer-events: none;
        }

        /* ===== HEADER ===== */
        .header {
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            position: relative; z-index: 10; flex-shrink: 0;
        }
        .header::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, var(--green-dim) 15%, var(--green) 30%, var(--gold) 50%, var(--red) 70%, var(--red-dim) 85%, transparent 100%);
            opacity: 0.6;
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 1.6rem; filter: drop-shadow(0 0 10px rgba(255,193,7,0.5)); }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem; font-weight: 900; letter-spacing: 3px;
            background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .header-right { display: flex; align-items: center; gap: 16px; }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,230,118,0.06);
            padding: 5px 14px; border-radius: 24px;
            border: 1px solid rgba(0,230,118,0.2);
            font-size: 0.65rem; font-weight: 800; color: var(--green);
            text-transform: uppercase; letter-spacing: 2px;
        }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 8px var(--green);
            animation: livePulse 1.5s ease-in-out infinite;
        }

        .timer-box {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 6px 18px; border-radius: 36px;
            border: 2px solid rgba(255,193,7,0.4);
            box-shadow: 0 0 18px rgba(255,193,7,0.08);
        }
        .timer-icon { font-size: 1rem; }
        .timer-label { color: var(--text-dim); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .timer-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem; font-weight: 900; color: var(--green);
            min-width: 44px; text-align: center;
            transition: color 0.3s; text-shadow: 0 0 16px currentColor;
        }
        .timer-value.warning { color: var(--gold); }
        .timer-value.critical { color: var(--red); animation: pulseScale 0.5s ease-in-out infinite; }
        .timer-unit { color: var(--text-dim); font-size: 0.8rem; font-weight: 600; }

        /* ===== KRASH ===== */
        .krash-banner {
            display: none;
            background: linear-gradient(90deg, #cc0022, #ff1744, #ffd740, #ff1744, #cc0022);
            background-size: 300% 100%;
            animation: gradientMove 1.2s linear infinite;
            padding: 10px; text-align: center;
            z-index: 5; position: relative; flex-shrink: 0;
            box-shadow: 0 4px 40px rgba(255,23,68,0.5);
        }
        .krash-banner.active { display: block; }
        .krash-banner h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem; font-weight: 900; color: #000;
            letter-spacing: 5px; text-transform: uppercase;
            animation: krashTextPulse 0.55s ease-in-out infinite alternate;
        }
        .krash-timer { color: rgba(0,0,0,0.7); font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; }

        /* ===== MAIN ===== */
        .main-content {
            height: 100vh;
            padding: 8px 12px 6px;
            display: flex; flex-direction: column;
            overflow: hidden; position: relative; z-index: 1;
        }
        .main-content.with-krash { height: calc(100vh - 52px); }

        /* ===== TICKER ===== */
        .ticker-bar {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-hi);
            border-radius: 6px; padding: 6px 12px;
            margin-bottom: 8px;
            display: flex; align-items: center; gap: 14px;
            overflow: hidden; flex-shrink: 0;
        }
        .ticker-bar .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,230,118,0.06);
            padding: 4px 10px; border-radius: 20px;
            border: 1px solid rgba(0,230,118,0.2);
            font-size: 0.6rem; font-weight: 800; color: var(--green);
            text-transform: uppercase; letter-spacing: 2px;
            flex-shrink: 0;
        }
        .ticker-bar .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 8px var(--green);
            animation: livePulse 1.5s ease-in-out infinite;
        }
        .ticker-bar .timer-box {
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px; border-radius: 20px;
            border: 1.5px solid rgba(255,193,7,0.4);
            box-shadow: 0 0 12px rgba(255,193,7,0.08);
            flex-shrink: 0;
        }
        .ticker-bar .timer-label {
            color: var(--text-dim); font-size: 0.55rem;
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        .ticker-bar .timer-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem; font-weight: 900; color: var(--green);
            min-width: 34px; text-align: center;
            transition: color 0.3s; text-shadow: 0 0 12px currentColor;
            line-height: 1;
        }
        .ticker-bar .timer-value.warning { color: var(--gold); }
        .ticker-bar .timer-value.critical { color: var(--red); animation: pulseScale 0.5s ease-in-out infinite; }
        .ticker-bar .timer-unit { color: var(--text-dim); font-size: 0.7rem; font-weight: 600; }
        .ticker-track { flex: 1; overflow: hidden; position: relative; }
        .ticker-content { display: flex; gap: 28px; animation: tickerScroll 30s linear infinite; white-space: nowrap; }
        .ticker-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 600; }
        .ticker-item .t-name { color: var(--text-dim); }
        .ticker-item .t-price { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.72rem; }
        .ticker-item .t-price.up { color: var(--red-light); }
        .ticker-item .t-price.down { color: var(--green-light); }
        .ticker-item .t-price.neutral { color: var(--text-dim); }
        .ticker-item .t-var { font-size: 0.6rem; padding: 1px 5px; border-radius: 4px; }
        .ticker-item .t-var.up   { background: var(--red-bg); color: var(--red-light); }
        .ticker-item .t-var.down { background: var(--green-bg); color: var(--green-light); }

        /* ===== CATEGORIES ===== */
        #categories-container {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            gap: 4px; overflow: hidden;
        }
        .category {
            display: flex; flex-direction: column;
            min-height: 0;
            /* flex set dynamically via JS based on row count */
        }
        .category-header {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 4px; flex-shrink: 0;
        }
        .category-badge { display: flex; align-items: center; gap: 6px; }
        .category-icon { font-size: 1rem; }
        .category-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.68rem; font-weight: 900;
            color: var(--gold); text-transform: uppercase; letter-spacing: 2.5px;
        }
        .category-count {
            font-size: 0.55rem; color: var(--text-dim);
            background: rgba(255,255,255,0.03);
            padding: 1px 7px; border-radius: 8px;
            font-weight: 700; border: 1px solid var(--border);
        }
        .category-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,193,7,0.18), transparent); }

        /* ===== GRID ===== */
        .drinks-grid {
            flex: 1; min-height: 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 1fr;
            gap: 5px;
        }

        /* ===== DRINK CARD — single-row horizontal ===== */
        .drink-card {
            background: var(--card);
            border: 1px solid var(--border-hi);
            border-left: 4px solid var(--border-hi);
            border-radius: 10px;
            display: flex; flex-direction: row; align-items: center;
            padding: 0 16px;
            gap: 14px;
            overflow: hidden;
            transition: box-shadow 0.4s, border-color 0.4s, background 0.4s;
            animation: cardAppear 0.3s ease-out both;
        }

        /* state: price-up (rouge) */
        .drink-card.price-up {
            background: var(--card-up);
            border-color: rgba(255,61,87,0.18);
            border-left-color: var(--red);
            box-shadow: inset 3px 0 16px rgba(255,61,87,0.06), 0 0 20px rgba(255,61,87,0.06);
        }
        /* state: price-down (vert) */
        .drink-card.price-down {
            background: var(--card-down);
            border-color: rgba(0,230,118,0.18);
            border-left-color: var(--green);
            box-shadow: inset 3px 0 16px rgba(0,230,118,0.06), 0 0 20px rgba(0,230,118,0.06);
        }
        /* state: krash (or) */
        .drink-card.krash {
            background: var(--card-krash);
            border-color: rgba(255,193,7,0.3);
            border-left-color: var(--gold);
            box-shadow: inset 3px 0 16px rgba(255,193,7,0.08), 0 0 28px rgba(255,193,7,0.1);
            animation: krashPulse 1s ease-in-out infinite, cardAppear 0.3s ease-out both;
        }

        /* Name + sparkline */
        .drink-info {
            flex: 1; min-width: 0;
            align-self: stretch;
            display: flex; flex-direction: row;
            align-items: center; gap: 10px;
        }
        .drink-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem; font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            color: var(--text);
            letter-spacing: 1px;
            flex: 0 1 auto; min-width: 0;
        }
        .sparkline-wrap {
            flex: 1; min-width: 0;
            display: flex; align-items: center;
        }
        .sparkline-svg { display: block; width: 100%; height: 18px; opacity: 0.7; }

        /* PRICE BLOCK — right column: price + variation stacked */
        .price-block {
            align-self: stretch;
            display: flex; flex-direction: column;
            align-items: flex-end; justify-content: center;
            flex-shrink: 0;
            padding: 10px 0;
            gap: 4px;
        }
        .drink-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.1rem; font-weight: 900;
            line-height: 1; white-space: nowrap;
            color: var(--text);
        }
        .drink-card.price-up   .drink-price { color: var(--red-light);   text-shadow: 0 0 18px var(--red-glow); }
        .drink-card.price-down .drink-price { color: var(--green-light); text-shadow: 0 0 18px var(--green-glow); }
        .drink-card.krash      .drink-price { color: var(--gold-bright); text-shadow: 0 0 22px var(--gold-glow); }

        .drink-price .unit { font-size: 0.85rem; opacity: 0.6; margin-left: 1px; }

        /* Variation badge — under price */
        .variation-badge {
            display: flex; align-items: center; gap: 2px;
            font-size: 0.62rem; font-weight: 700;
            white-space: nowrap; line-height: 1;
            padding: 2px 5px; border-radius: 4px;
        }
        .variation-badge.up      { background: var(--red-bg);   color: var(--red-light);   border: 1px solid rgba(255,61,87,0.18); }
        .variation-badge.down    { background: var(--green-bg); color: var(--green-light); border: 1px solid rgba(0,230,118,0.18); }
        .variation-badge.neutral { background: rgba(107,122,153,0.05); color: var(--text-dim); border: 1px solid var(--border); opacity: 0.5; }

        /* ===== WAITING ===== */
        .waiting-screen {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; gap: 24px;
        }
        .waiting-icon { font-size: 5rem; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 24px rgba(255,193,7,0.4)); }
        .waiting-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .waiting-subtitle { color: var(--text-dim); font-size: 1.2rem; animation: fadePulse 2s ease-in-out infinite; }

        /* ===== ANIMATIONS ===== */
        @keyframes livePulse   { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes pulseScale  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        @keyframes float       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        @keyframes fadePulse   { 0%,100%{opacity:0.5} 50%{opacity:1} }
        @keyframes gradientMove{ 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
        @keyframes krashPulse  { 0%,100%{box-shadow:inset 3px 0 16px rgba(255,193,7,0.05),0 0 20px rgba(255,193,7,0.08)} 50%{box-shadow:inset 3px 0 24px rgba(255,193,7,0.12),0 0 44px rgba(255,193,7,0.18)} }
        @keyframes krashIconPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        @keyframes krashTextPulse { from{letter-spacing:5px} to{letter-spacing:8px;transform:scale(1.02)} }
        @keyframes priceUpdate { 0%{transform:scale(1)} 30%{transform:scale(1.08)} 65%{transform:scale(0.97)} 100%{transform:scale(1)} }
        .price-updating { animation: priceUpdate 0.5s ease-out; }
        @keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
        @keyframes cardAppear  { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
    </style>
</head>

<body>
    <!-- Krash Banner -->
    <div class="krash-banner" id="krash-banner">
        <h2 id="krash-banner-title">⚡ KRASH BOURSIER EN COURS ⚡</h2>
        <div class="krash-timer" id="krash-banner-sub">Temps restant: <span id="krash-remaining">1:30</span></div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Ticker Bar with integrated timer -->
        <div class="ticker-bar" id="ticker-bar" style="display: none;">
            <div class="live-badge">
                <span class="live-dot"></span>
                <span>LIVE</span>
            </div>
            <div class="ticker-track">
                <div class="ticker-content" id="ticker-content"></div>
            </div>
            <div class="timer-box">
                <span class="timer-label">Prochain tick</span>
                <span class="timer-value" id="timer-value">--</span>
                <span class="timer-unit">s</span>
            </div>
        </div>

        <div id="categories-container">
            <div class="waiting-screen">
                <div class="waiting-icon">🍺📊</div>
                <h2 class="waiting-title">BAR TRADERS</h2>
                <p class="waiting-subtitle">En attente du démarrage de la session...</p>
            </div>
        </div>
    </main>

    <script>
        const socket = io();

        let drinks = {};
        let priceHistory = {};
        let krashActive = false;
        let categoryConfig = {};

        // Emojis par nom de boisson (fallback sur le type si absent)
        const drinkEmojis = {
            'bière': '🍺', 'pression': '🍺', 'blonde': '🍺', 'brune': '🍺', 'ambrée': '🍺',
            'coca': '🥤', 'cola': '🥤', 'pepsi': '🥤', 'fanta': '🥤', 'sprite': '🥤',
            'eau': '💧', 'perrier': '💧', 'badoit': '💧',
            'vin': '🍷', 'rouge': '🍷', 'blanc': '🍷', 'rosé': '🍷',
            'champagne': '🥂', 'prosecco': '🥂', 'mousseux': '🥂',
            'mojito': '🍹', 'cocktail': '🍹', 'margarita': '🍹', 'sangria': '🍹',
            'shot': '🥃', 'whisky': '🥃', 'whiskey': '🥃', 'vodka': '🥃',
            'rhum': '🥃', 'tequila': '🥃', 'gin': '🥃', 'cognac': '🥃',
            'café': '☕', 'expresso': '☕', 'cappuccino': '☕',
            'jus': '🧃', 'orange': '🧃', 'pomme': '🧃',
        };

        // AudioContext persistant pour la sirène (initialisé au premier geste utilisateur)
        let audioCtx = null;
        document.addEventListener('click', () => {
            if (!audioCtx) {
                const AC = window.AudioContext || window.webkitAudioContext;
                if (AC) audioCtx = new AC();
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: false });


        // Logos de marques par mot-clé dans le nom de la boisson
        const drinkLogos = {
            'desperados': '/static/images/logos/desperados.png',
            'heineken':   '/static/images/logos/heineken.png',
            'guinness':   '/static/images/logos/guinness.png',
            'orangina':   '/static/images/logos/orangina.png',
            'perrier':    '/static/images/logos/perrier.png',
            'chipek':     '/static/images/logos/chipek.png',
            'grim':       '/static/images/logos/grimbergen.png',
            'phoenix':    '/static/images/logos/phoenix.png',
            'slash':      '/static/images/logos/slash.png',
        };

        function getDrinkIcon(drink) {
            const icon = drink.icon;
            // 1. Icône définie manuellement sur la boisson (image URL ou emoji)
            if (icon && icon.trim()) {
                if (icon.startsWith('/') || icon.startsWith('http')) {
                    return `<img src="${icon}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;">`;
                }
                return icon;
            }
            // 2. Logo de marque par nom
            const lower = drink.name.toLowerCase();
            for (const [key, path] of Object.entries(drinkLogos)) {
                if (lower.includes(key)) {
                    return `<img src="${path}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;">`;
                }
            }
            // 3. Icône du type de boisson
            return categoryConfig[drink.type]?.icon || '🍷';
        }

        const timerValue = document.getElementById('timer-value');
        const krashBanner = document.getElementById('krash-banner');
        const krashRemaining = document.getElementById('krash-remaining');
        const mainContent = document.getElementById('main-content');
        const categoriesContainer = document.getElementById('categories-container');
        const tickerBar = document.getElementById('ticker-bar');
        const tickerContent = document.getElementById('ticker-content');

        // Load category config from API
        async function loadCategoryConfig() {
            try {
                const res = await fetch('/api/types');
                categoryConfig = await res.json();
            } catch (e) {
                categoryConfig = {
                    'Bière': { icon: '🍺', order: 1 },
                    'Soft': { icon: '🥤', order: 2 },
                    'Cocktail': { icon: '🍹', order: 3 }
                };
            }
        }

        socket.on('connect', () => {
            console.log('✅ Connected');
            loadCategoryConfig();
        });

        socket.on('prices_update', (data) => {
            if (data.drinks && Object.keys(data.drinks).length > 0) {
                for (const category of Object.values(data.drinks)) {
                    for (const drink of category) {
                        if (!priceHistory[drink.id]) {
                            priceHistory[drink.id] = [];
                        }
                        priceHistory[drink.id].push(drink.price_current);
                        if (priceHistory[drink.id].length > 12) {
                            priceHistory[drink.id].shift();
                        }
                    }
                }

                drinks = data.drinks;
                const animate = ['price_update', 'krash_started', 'krash_ended'].includes(data.event);
                renderDrinks(animate);
                renderTicker();
            }

            if (data.event === 'krash_started') {
                krashActive = true;
                showKrashBanner();
                playSiren();
            } else if (data.event === 'krash_ended') {
                krashActive = false;
                hideKrashBanner();
            }
        });

        socket.on('timer_update', (data) => {
            updateTimer(data.timer);
            if (data.krash_active) {
                krashActive = true;
                updateKrashTimer(data.krash_remaining);
                showKrashBanner();
            } else if (krashActive) {
                krashActive = false;
                hideKrashBanner();
            }
        });

        socket.on('session_stopped', () => {
            timerValue.textContent = '--';
            timerValue.classList.remove('warning', 'critical');
            showWaitingScreen();
        });

        socket.on('krash', (data) => {
            if (data.active) {
                krashActive = true;
                showKrashBanner();
            } else {
                krashActive = false;
                hideKrashBanner();
            }
        });

        function updateTimer(seconds) {
            timerValue.textContent = seconds;
            timerValue.classList.remove('warning', 'critical');
            if (seconds <= 10) timerValue.classList.add('critical');
            else if (seconds <= 20) timerValue.classList.add('warning');
        }

        function showKrashBanner() {
            const title = document.getElementById('krash-banner-title');
            const sub = document.getElementById('krash-banner-sub');
            title.textContent = '⚡ KRASH BOURSIER EN COURS ⚡';
            if (sub) sub.style.display = '';
            krashBanner.style.background = '';
            krashBanner.classList.add('active');
            mainContent.classList.add('with-krash');
        }

        function playSiren() {
            try {
                if (!audioCtx) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (!AC) return;
                    audioCtx = new AC();
                }
                const play = () => {
                    const ctx = audioCtx;
                    const totalDuration = 10;
                    const toneDuration = 0.65;
                    const tones = Math.floor(totalDuration / toneDuration);
                    const freqLow  = 440;
                    const freqHigh = 660;
                    const detune   = 8;

                    const osc1 = ctx.createOscillator();
                    const osc2 = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(ctx.destination);
                    osc1.type = 'sawtooth';
                    osc2.type = 'sawtooth';

                    const start = ctx.currentTime;
                    for (let i = 0; i < tones; i++) {
                        const t    = start + i * toneDuration;
                        const freq = (i % 2 === 0) ? freqLow : freqHigh;
                        osc1.frequency.setValueAtTime(freq * 0.95, t);
                        osc1.frequency.linearRampToValueAtTime(freq, t + 0.07);
                        osc2.frequency.setValueAtTime(freq * 0.95 + detune, t);
                        osc2.frequency.linearRampToValueAtTime(freq + detune, t + 0.07);
                    }

                    gain.gain.setValueAtTime(0, start);
                    gain.gain.linearRampToValueAtTime(0.45, start + 0.12);
                    gain.gain.setValueAtTime(0.45, start + totalDuration - 0.4);
                    gain.gain.linearRampToValueAtTime(0, start + totalDuration);

                    osc1.start(start);
                    osc2.start(start);
                    osc1.stop(start + totalDuration);
                    osc2.stop(start + totalDuration);
                };

                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(play);
                } else {
                    play();
                }
            } catch (e) {
                console.log('[Wall] Sirène audio indisponible:', e);
            }
        }

        function hideKrashBanner() {
            krashBanner.classList.remove('active');
            mainContent.classList.remove('with-krash');
        }

        function updateKrashTimer(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            krashRemaining.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showWaitingScreen() {
            tickerBar.style.display = 'none';
            categoriesContainer.innerHTML = `
                <div class="waiting-screen">
                    <div class="waiting-icon">🍺📊</div>
                    <h2 class="waiting-title">BAR TRADERS</h2>
                    <p class="waiting-subtitle">En attente du démarrage de la session...</p>
                </div>
            `;
        }

        function getTickerEmoji(name, type) {
            const lower = name.toLowerCase();
            if (drinkEmojis[lower]) return drinkEmojis[lower];
            for (const [key, emoji] of Object.entries(drinkEmojis)) {
                if (lower.includes(key) || key.includes(lower)) return emoji;
            }
            const typeEmojis = {
                'Bière': '🍺', 'Soft': '🥤', 'Cocktail': '🍹',
                'Shot': '🥃', 'Vin': '🍷', 'Spiritueux': '🥃'
            };
            return typeEmojis[type] || '🍷';
        }

        function renderTicker() {
            const allDrinks = [];
            for (const category of Object.values(drinks)) {
                for (const drink of category) {
                    allDrinks.push(drink);
                }
            }
            if (allDrinks.length === 0) return;

            tickerBar.style.display = 'flex';

            let html = '';
            const items = allDrinks.concat(allDrinks);
            for (const drink of items) {
                const variation = drink.price_previous ? drink.price_current - drink.price_previous : 0;
                const isUp = variation > 0;
                const isDown = variation < 0;
                const trendClass = isUp ? 'up' : (isDown ? 'down' : 'neutral');
                const arrow = isUp ? '▲' : (isDown ? '▼' : '');
                const varText = variation !== 0 ? (isUp ? '+' : '') + variation.toFixed(2) + '€' : '';
                const emoji = getTickerEmoji(drink.name, drink.type);

                html += `
                    <div class="ticker-item">
                        <span>${emoji}</span>
                        <span class="t-name">${drink.name}</span>
                        <span class="t-price ${trendClass}">${drink.price_current.toFixed(2)}€</span>
                        ${varText ? `<span class="t-var ${trendClass}">${arrow} ${varText}</span>` : ''}
                    </div>
                `;
            }
            tickerContent.innerHTML = html;
        }

        function renderDrinks(animate = false) {
            const sortedCategories = Object.keys(drinks).sort((a, b) =>
                (categoryConfig[a]?.order || 99) - (categoryConfig[b]?.order || 99)
            );

            let html = '';

            for (const category of sortedCategories) {
                const items = drinks[category];
                if (!items || items.length === 0) continue;

                const config = categoryConfig[category] || { icon: '🍷', order: 99 };
                const rowCount = Math.ceil(items.length / 4);

                html += `
                    <div class="category" style="flex: ${rowCount};">
                        <div class="category-header">
                            <div class="category-badge">
                                <span class="category-icon">${config.icon}</span>
                                <span class="category-title">${category}</span>
                            </div>
                            <span class="category-count">${items.length} boissons</span>
                            <div class="category-line"></div>
                        </div>
                        <div class="drinks-grid">
                `;

                items.forEach((drink, i) => {
                    html += renderCard(drink, animate, i);
                });

                html += `
                        </div>
                    </div>
                `;
            }

            categoriesContainer.innerHTML = html;
            requestAnimationFrame(fitDrinkNames);
        }

        function fitDrinkNames() {
            document.querySelectorAll('.drink-card').forEach(card => {
                const name = card.querySelector('.drink-name');
                const priceBlock = card.querySelector('.price-block');
                const sparkWrap = card.querySelector('.sparkline-wrap');
                if (!name) return;

                const cardWidth = card.clientWidth;
                const priceWidth = priceBlock ? priceBlock.offsetWidth : 0;
                const minSparkline = sparkWrap ? 50 : 0;
                const padding = 44;
                const available = Math.max(40, cardWidth - priceWidth - minSparkline - padding);

                name.style.fontSize = '';
                let size = parseFloat(getComputedStyle(name).fontSize);
                const maxSize = size;
                while (name.scrollWidth > available && size > 10) {
                    size -= 0.5;
                    name.style.fontSize = size + 'px';
                }
            });
        }

        window.addEventListener('resize', () => requestAnimationFrame(fitDrinkNames));

        function generateSparklineSVG(drinkId, trend) {
            let full = priceHistory[drinkId] || [];
            let data = full.slice(-3);
            if (data.length < 2) return '';

            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 0.5;

            const width = 80;
            const height = 14;
            const padding = 2;

            let pathD = '';
            data.forEach((val, i) => {
                const x = (i / (data.length - 1)) * (width - padding * 2) + padding;
                const y = height - padding - ((val - min) / range) * (height - padding * 2);
                pathD += (i === 0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
            });

            const color = trend === 'down' ? '#00e676' : (trend === 'up' ? '#ff3d57' : '#4a5568');

            return `
                <svg class="sparkline-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
                    <path d="${pathD}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            `;
        }

        function renderCard(drink, animate, index) {
            const variation = drink.price_previous ? drink.price_current - drink.price_previous : 0;
            const isUp = variation > 0;
            const isDown = variation < 0;

            let cardClass = 'drink-card';
            if (krashActive) cardClass += ' krash';
            else if (isDown) cardClass += ' price-down';
            else if (isUp) cardClass += ' price-up';

            let badgeClass = 'neutral';
            let arrow = '';
            let varText = '—';

            if (isUp) {
                badgeClass = 'up';
                arrow = '▲';
                varText = '+' + variation.toFixed(2) + '€';
            } else if (isDown) {
                badgeClass = 'down';
                arrow = '▼';
                varText = variation.toFixed(2) + '€';
            }

            const priceClass = animate ? 'price-updating' : '';
            const trend = isDown ? 'down' : (isUp ? 'up' : 'neutral');
            const sparklineSVG = generateSparklineSVG(drink.id, trend);
            const iconContent = getDrinkIcon(drink);
            const delay = index * 0.04;

            return `
                <div class="${cardClass}" style="animation-delay: ${delay}s;">
                    <div class="drink-info">
                        <div class="drink-name" title="${drink.name}">${drink.name}</div>
                        ${sparklineSVG ? `<div class="sparkline-wrap">${sparklineSVG}</div>` : ''}
                    </div>
                    <div class="price-block">
                        <div class="drink-price ${priceClass}">
                            ${drink.price_current.toFixed(2)}<span class="unit">€</span>
                        </div>
                        <div class="variation-badge ${badgeClass}">
                            ${arrow}${variation !== 0 ? (isUp ? '+' : '') + variation.toFixed(2) + '€' : '—'}
                        </div>
                    </div>
                </div>
            `;
        }

        // Init
        async function loadHistory(allDrinks) {
            await Promise.all(allDrinks.map(async drink => {
                try {
                    const res = await fetch(`/api/history/${drink.id}?limit=3`);
                    const hist = await res.json();
                    if (Array.isArray(hist) && hist.length > 0) {
                        priceHistory[drink.id] = hist.map(h => h.price).reverse();
                    } else {
                        const seed = [];
                        if (drink.price_previous) seed.push(drink.price_previous);
                        seed.push(drink.price_current);
                        priceHistory[drink.id] = seed;
                    }
                } catch(e) {
                    priceHistory[drink.id] = [drink.price_current];
                }
            }));
        }

        loadCategoryConfig().then(async () => {
            const res = await fetch('/api/drinks');
            const data = await res.json();
            if (Object.keys(data).length > 0) {
                drinks = data;
                const allDrinks = Object.values(data).flat();
                await loadHistory(allDrinks);
                renderDrinks();
                renderTicker();
            }
        });
    </script>
</body>
